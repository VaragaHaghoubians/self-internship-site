<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2720"/>
      <stop offset="100%" style="stop-color:#0a0d0b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf"/>
      <stop offset="100%" style="stop-color:#5eead4"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Circuit dot top-left -->
  <circle cx="10" cy="10" r="2.5" fill="#2dd4bf" opacity="0.5"/>
  <!-- Circuit dot top-right -->
  <circle cx="54" cy="10" r="2.5" fill="#2dd4bf" opacity="0.5"/>
  <!-- Circuit dot bottom-left -->
  <circle cx="10" cy="54" r="2.5" fill="#2dd4bf" opacity="0.3"/>
  <!-- Circuit dot bottom-right -->
  <circle cx="54" cy="54" r="2.5" fill="#2dd4bf" opacity="0.3"/>

  <!-- Small corner lines (circuit feel) -->
  <line x1="10" y1="10" x2="18" y2="10" stroke="#2dd4bf" stroke-width="1.2" opacity="0.35"/>
  <line x1="10" y1="10" x2="10" y2="18" stroke="#2dd4bf" stroke-width="1.2" opacity="0.35"/>
  <line x1="54" y1="10" x2="46" y2="10" stroke="#2dd4bf" stroke-width="1.2" opacity="0.35"/>
  <line x1="54" y1="10" x2="54" y2="18" stroke="#2dd4bf" stroke-width="1.2" opacity="0.35"/>

  <!-- "12" text centered -->
  <text
    x="32"
    y="42"
    text-anchor="middle"
    font-family="'Segoe UI', Inter, Arial Black, sans-serif"
    font-weight="900"
    font-size="30"
    fill="url(#accent)"
    letter-spacing="-1"
  >12</text>

  <!-- Small underline bar -->
  <rect x="16" y="46" width="32" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
</svg>
